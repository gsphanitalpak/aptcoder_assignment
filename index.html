<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Smart Gate Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-96 text-center">

        <h1 class="text-3xl font-bold mb-6">
        Gate Dashboard
        </h1>

        <div class="border rounded-lg p-5 mb-6">

            <p class="text-gray-500 mb-2">
                Live Feed
            </p>

            <h2 id="status" class="text-2xl font-semibold text-red-500">
                Gate Closed
            </h2>

        </div>

        <button id="triggerBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-3 rounded-lg">
            Simulate Vehicle
        </button>

    </div>
    <script>
        const statusText = document.getElementById("status");

        const triggerBtn = document.getElementById("triggerBtn");

        triggerBtn.addEventListener("click", function () {
            // Gate opening
            statusText.innerText = "Gate Opening...";
            statusText.className = "text-2xl font-semibold text-yellow-500";

            // Delay 2 seconds Gate Open
            setTimeout(function () {
                statusText.innerText = "Gate Open";
                statusText.className = "text-2xl font-semibold text-green-500";
            }, 2000);

            // Delay 5 seconds Gate Closed
            setTimeout(function () {
                statusText.innerText = "Gate Closed";
                statusText.className = "text-2xl font-semibold text-red-500";
            }, 5000);
        });
    </script>
</body>

</html>
